:root{
  --purple:#7C3AED;--purple-dark:#5B21B6;--purple-lt:#A78BFA;
  --purple-pale:#EDE9FF;--purple-bg:#F5F3FF;--lavender:#DDD6FE;
  --pink:#F472B6;--pink-pale:#FCE7F3;--white:#FFFFFF;
  --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;
  --gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-500:#6B7280;
  --gray-600:#4B5563;--gray-700:#374151;--gray-800:#1F2937;
  --green:#10B981;--green-pale:#D1FAE5;--red:#EF4444;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--purple-bg);}
#app{width:100%;height:100%;display:flex;flex-direction:column;background:var(--white);overflow:hidden;max-width:430px;margin:0 auto;position:relative;}
@media(min-width:500px){
  body{display:flex;align-items:flex-start;justify-content:center;padding:24px 0 40px;overflow-y:auto;min-height:100vh;}
  #app{border-radius:44px;min-height:852px;box-shadow:0 40px 100px rgba(124,58,237,0.28),0 0 0 10px rgba(124,58,237,0.07);height:auto;}
}
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;animation:fadeIn .32s ease;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes typingPulse{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes slideRight{from{transform:translateX(-100%)}to{transform:translateX(0)}}

#bottom-nav{display:flex;border-top:1.5px solid var(--gray-100);background:var(--white);padding:8px 0 calc(14px + var(--safe-bottom));flex-shrink:0;z-index:50;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--gray-400);font-family:'Nunito',sans-serif;font-size:10px;font-weight:600;position:relative;padding:4px 0;}
.nav-btn.active{color:var(--purple);font-weight:900;}
.nav-btn svg{width:22px;height:22px;}
.nav-dot{position:absolute;top:0;right:22%;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--white);}

.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--purple);color:var(--white);border:none;border-radius:30px;padding:15px 28px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;letter-spacing:.2px;box-shadow:0 6px 20px rgba(124,58,237,.38);transition:transform .12s,opacity .12s;width:100%;}
.btn-primary:active{transform:scale(.97);}
.btn-primary:disabled{background:var(--gray-300);box-shadow:none;cursor:not-allowed;}
.btn-outline{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--white);color:var(--purple);border:2px solid var(--purple);border-radius:30px;padding:13px 28px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .12s;width:100%;}
.btn-outline:active{transform:scale(.97);}
.btn-sm{display:inline-flex;align-items:center;justify-content:center;gap:5px;background:var(--purple);color:var(--white);border:none;border-radius:22px;padding:8px 16px;font-size:12.5px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 3px 10px rgba(124,58,237,.32);transition:transform .12s;white-space:nowrap;flex-shrink:0;}
.btn-sm:active{transform:scale(.96);}
.btn-sm.joined{background:var(--purple-pale);color:var(--purple);box-shadow:none;}
.btn-sm.outline{background:transparent;color:var(--purple);border:1.5px solid var(--purple);box-shadow:none;}
.btn-ghost{border:none;background:none;cursor:pointer;font-family:'Nunito',sans-serif;}

.input-group{margin-bottom:18px;}
.input-label{display:block;font-size:11px;font-weight:800;color:var(--gray-500);margin-bottom:7px;letter-spacing:.6px;text-transform:uppercase;}
.input-field{width:100%;padding:14px 16px;border-radius:14px;border:2px solid var(--gray-200);font-size:15px;font-weight:600;font-family:'Nunito',sans-serif;outline:none;color:var(--gray-800);background:var(--white);transition:border .2s;}
.input-field:focus{border-color:var(--purple);}
.input-field.valid{border-color:var(--green);}
.input-field.error{border-color:var(--red);}
.input-hint{font-size:12px;margin-top:5px;font-weight:600;}
.input-hint.ok{color:var(--green);}
.input-hint.err{color:var(--red);}

.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;border:1.5px solid var(--lavender);background:var(--purple-pale);color:var(--purple);white-space:nowrap;}
.tag.active{background:var(--purple);color:var(--white);border-color:var(--purple);}
.tag.sm{font-size:10px;padding:2px 8px;}

.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--white);flex-shrink:0;letter-spacing:-.5px;overflow:hidden;}
.progress-dots{display:flex;gap:6px;justify-content:center;margin-bottom:28px;}
.pdot{height:8px;border-radius:4px;background:var(--lavender);transition:all .3s;}
.pdot.active{background:var(--purple);}

.card{border:1.5px solid var(--gray-100);border-radius:18px;padding:14px 16px;background:var(--white);}
.circle-icon{border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}

.overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;}
.modal-sheet{background:var(--white);border-radius:26px 26px 0 0;padding:22px 22px calc(32px + var(--safe-bottom));width:100%;max-height:90%;overflow-y:auto;animation:slideUp .35s cubic-bezier(.32,.72,0,1) both;}
.modal-full{position:absolute;inset:0;background:var(--white);z-index:200;display:flex;flex-direction:column;overflow:hidden;animation:fadeIn .25s ease;}

.bubble-mine{background:var(--purple);color:var(--white);border-radius:20px 20px 4px 20px;padding:11px 16px;max-width:230px;font-size:14px;font-weight:600;line-height:1.45;}
.bubble-other{background:var(--gray-100);color:var(--gray-800);border-radius:20px 20px 20px 4px;padding:11px 16px;max-width:230px;font-size:14px;font-weight:600;line-height:1.45;}
.bubble-system{background:var(--purple-pale);color:var(--purple);border-radius:14px;padding:12px 16px;font-size:13px;font-weight:700;line-height:1.4;text-align:center;}

.interest-tile{border-radius:16px;border:2px solid var(--gray-200);background:var(--white);padding:16px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;position:relative;transition:all .15s;font-family:'Nunito',sans-serif;width:100%;}
.interest-tile.sel{border-color:var(--purple);background:var(--purple-pale);transform:scale(1.03);box-shadow:0 4px 14px rgba(124,58,237,.2);}
.interest-tile .check{position:absolute;top:5px;right:5px;width:18px;height:18px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;}

.section-title{font-size:13px;font-weight:800;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;}
.divider{height:1px;background:var(--gray-100);margin:0;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;text-align:center;}
.mood-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px;border-radius:14px;border:2px solid transparent;background:var(--white);cursor:pointer;flex-shrink:0;min-width:56px;transition:all .15s;font-family:'Nunito',sans-serif;}
.mood-btn.sel{background:var(--purple);border-color:var(--purple);}
.gradient-card{background:linear-gradient(135deg,var(--purple) 0%,var(--purple-lt) 100%);border-radius:22px;padding:20px 22px;position:relative;overflow:hidden;}

.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--gray-400);display:inline-block;animation:typingPulse 1.4s infinite ease-in-out;}
.typing-dot:nth-child(1){animation-delay:0s;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}

/* AI spinner */
.ai-spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}

/* Image bubble */
.bubble-img{max-width:200px;border-radius:14px;overflow:hidden;cursor:pointer;}
.bubble-img img{width:100%;display:block;border-radius:14px;}

/* Help chat */
.help-bubble{background:linear-gradient(135deg,var(--purple),var(--purple-lt));color:white;border-radius:18px 18px 18px 4px;padding:12px 16px;font-size:13.5px;font-weight:600;line-height:1.5;margin-bottom:8px;max-width:280px;}
.help-user-bubble{background:var(--gray-100);color:var(--gray-800);border-radius:18px 18px 4px 18px;padding:12px 16px;font-size:13.5px;font-weight:600;line-height:1.5;margin-bottom:8px;max-width:280px;align-self:flex-end;}

/* Avatar image */
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

/* Profile pic upload */
.profile-pic-ring{position:relative;display:inline-block;}
.profile-pic-badge{position:absolute;bottom:0;right:0;width:26px;height:26px;background:var(--purple);border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* Dark mode */
body.dark{background:#0f0d1a;}
body.dark #app{background:#1a1625;}
body.dark .screen{background:#1a1625;}
body.dark #bottom-nav{background:#1a1625;border-color:#2d2640;}
body.dark .card{background:#231e30;border-color:#2d2640;}
body.dark .input-field{background:#231e30;border-color:#2d2640;color:#e2dff0;}
body.dark .bubble-other{background:#2d2640;color:#e2dff0;}
body.dark .bubble-system{background:#2d2640;color:var(--purple-lt);}
body.dark .modal-full{background:#1a1625;}
body.dark .modal-sheet{background:#1a1625;}
body.dark .help-user-bubble{background:#2d2640;color:#e2dff0;}
body.dark .overlay{background:rgba(0,0,0,.7);}
body.dark .mood-btn{background:#231e30;}
body.dark .interest-tile{background:#231e30;border-color:#2d2640;color:#e2dff0;}
body.dark .tag{background:#2d2640;border-color:#3d3560;color:var(--purple-lt);}

/* Confession card */
.confession-card{background:linear-gradient(135deg,#231e30,#1a1625);border:1.5px solid var(--lavender);border-radius:18px;padding:16px;margin-bottom:12px;position:relative;}
body:not(.dark) .confession-card{background:linear-gradient(135deg,var(--purple-pale),var(--pink-pale));}
.confession-card .conf-text{font-size:14px;font-weight:600;color:var(--gray-700);line-height:1.5;font-style:italic;margin-bottom:10px;}
body.dark .confession-card .conf-text{color:#e2dff0;}
.confession-card .conf-meta{font-size:11px;color:var(--gray-400);font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.conf-react-btn{border:none;background:var(--purple-pale);border-radius:20px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:transform .1s;}
.conf-react-btn:active{transform:scale(.93);}
body.dark .conf-react-btn{background:#2d2640;}

/* Compatibility meter */
.compat-meter{height:6px;border-radius:3px;background:var(--gray-200);overflow:hidden;}
.compat-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--purple),var(--pink));transition:width .8s ease;}

/* Dark mode toggle */
.toggle-track{width:44px;height:24px;border-radius:12px;background:var(--gray-300);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle-track.on{background:var(--purple);}
.toggle-thumb{width:20px;height:20px;border-radius:50%;background:white;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 2px 6px rgba(0,0,0,.15);}
.toggle-track.on .toggle-thumb{transform:translateX(20px);}
</style>

  const res = await fetch(GROQ_URL, {

function avatarBg(name=''){
  const h=(name.charCodeAt(0)||0)*37+((name.charCodeAt(1)||0)*13);
  return `hsl(${h%360},50%,62%)`;
}
function avatarInitials(name=''){return name.trim().split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function nowTime(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object'){Object.assign(e.style,v);}
    else if(k.startsWith('on')&&typeof v==='function'){e.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==='className'){e.className=v;}
    else if(k==='html'){e.innerHTML=v;}
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{
    if(c==null||c===false)return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}

function icon(path,size=22,color='var(--purple)'){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',size);svg.setAttribute('height',size);svg.setAttribute('viewBox','0 0 24 24');svg.setAttribute('fill','none');
  svg.style.flexShrink='0';
  svg.innerHTML=path.replace(/COLOR/g,color);
  return svg;
}

function mkAvatar(name, size=42, extraStyle='', pic=null){
  const bg=avatarBg(name); const fs=Math.round(size*.38);
  if(pic){
    return `<div class="avatar" style="width:${size}px;height:${size}px;background:${bg};font-size:${fs}px;${extraStyle}"><img src="${pic}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/></div>`;
  }
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${bg};font-size:${fs}px;${extraStyle}">${avatarInitials(name)}</div>`;
}

async function getAIPersonReply(person, chatHistory, userMsg) {
  const p = PEOPLE.find(x=>x.id===person.id);
  const shared = (p?.interests||[]).filter(i=>STATE.user?.interests?.includes(i));
  
  const systemPrompt = `You are ${p?.name||'a student'}, a student at Chitkara University. 
Personality: ${p?.personality||'friendly and warm'}.
Your interests: ${(p?.interests||[]).join(', ')}.
You share these interests with the user: ${shared.join(', ') || 'none yet'}.
You are texting another student on a social app called CU Circle where students connect over shared interests.
RULES:
- Reply in 1-2 sentences max, casual texting style
- Be authentic to your personality
- Use 1-2 relevant emojis naturally
- DO NOT use formal language or bullet points
- Sound like a real college student texting
- Reference shared interests when relevant

  const groqMsgs = chatHistory

  } else if(step===4){
    const fullName=`${OB.firstName.trim()} ${OB.lastName.trim()}`;
    scroll.innerHTML+=`<div style="text-align:center;margin-bottom:28px;">${mkAvatar(fullName,72,'border:4px solid var(--white);box-shadow:0 8px 24px rgba(0,0,0,.12);margin:0 auto 16px;')}<p style="font-size:22px;font-weight:900;color:var(--gray-800);margin-bottom:4px;">Looking good, ${OB.firstName}! 🎉</p><p style="font-size:13px;color:var(--gray-500);">Here's what we'll show on your profile:</p></div>

let tempInterests=[];
function buildInterests(){
  if(STATE.user&&STATE.user.interests.length>0&&tempInterests.length===0){tempInterests=[...STATE.user.interests];}
  const wrap=el('div',{className:'screen'});
  const scroll=el('div',{className:'scroll',style:{padding:'28px 20px 24px'}});
  scroll.innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;">
      <div><p style="font-size:22px;font-weight:900;color:var(--gray-800);margin-bottom:4px;">What do you love? 💜</p><p style="font-size:13.5px;color:var(--gray-500);line-height:1.5;">Select hobbies & interests — we'll find your people.</p></div>
    </div>
    <p style="font-size:12px;color:var(--purple);font-weight:800;margin:8px 0 16px;" id="sel-count">${tempInterests.length===0?'Pick at least 3':tempInterests.length+' selected ✓'}</p>
  `;
  const grid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px',marginBottom:'20px'}});
  INTERESTS.forEach(({e,l})=>{
    const isSel=tempInterests.includes(l);
    const tile=el('button',{className:'interest-tile'+(isSel?' sel':''),onClick:()=>{
      if(tempInterests.includes(l)){tempInterests=tempInterests.filter(x=>x!==l);}else{tempInterests.push(l);}
      tile.className='interest-tile'+(tempInterests.includes(l)?' sel':'');
      tile.innerHTML=`${tempInterests.includes(l)?'<div class="check"><svg width="11" height="11" viewBox="0 0 24 24" fill="none">'+ICONS.check.replace(/COLOR/g,'white')+'</svg></div>':''}<span style="font-size:24px;">${e}</span><span style="font-size:11px;font-weight:800;color:${tempInterests.includes(l)?'var(--purple)':'var(--gray-700)'};">${l}</span>`;
      const cnt=document.getElementById('sel-count');if(cnt)cnt.textContent=tempInterests.length===0?'Pick at least 3':tempInterests.length+' selected ✓';
      const sbtn=document.getElementById('save-interests');if(sbtn)sbtn.disabled=tempInterests.length<3;
    }});
    tile.innerHTML=`${isSel?'<div class="check"><svg width="11" height="11" viewBox="0 0 24 24" fill="none">'+ICONS.check.replace(/COLOR/g,'white')+'</svg></div>':''}<span style="font-size:24px;">${e}</span><span style="font-size:11px;font-weight:800;color:${isSel?'var(--purple)':'var(--gray-700)'};">${l}</span>`;
    grid.appendChild(tile);
  });
  scroll.appendChild(grid);
  const saveBtn=el('button',{className:'btn-primary',id:'save-interests',onClick:()=>{
    if(tempInterests.length<3){alert('Please select at least 3 interests!');return;}
    STATE.user.interests=[...tempInterests];tempInterests=[];
    STATE.screen='main';STATE.activeTab='home';render();
  }});
  saveBtn.textContent='Save & Find My People →';
  if(tempInterests.length<3)saveBtn.disabled=true;
  scroll.appendChild(saveBtn);
  wrap.appendChild(scroll);return wrap;
}

function buildMain(content){

  if(STATE.viewProfile){mainWrap.appendChild(buildProfileView());content.appendChild(mainWrap);return;}
  if(STATE.helpOpen){mainWrap.appendChild(buildHelpScreen());content.appendChild(mainWrap);return;}

function buildBottomNav(){
  const nav=el('div',{id:'bottom-nav'});
  const tabs=[{id:'home',ic:'home',l:'Home'},{id:'circles',ic:'circles',l:'Circles'},{id:'connect',ic:'connect',l:'Connect'},{id:'messages',ic:'msg',l:'Messages'},{id:'profile',ic:'profile',l:'Profile'}];
  tabs.forEach(t=>{
    const active=STATE.activeTab===t.id;
    const btn=el('button',{className:'nav-btn'+(active?' active':''),onClick:()=>{STATE.activeTab=t.id;STATE.chatTarget=null;STATE.viewProfile=null;STATE.helpOpen=false;render();}});

    nav.appendChild(btn);
  });
  return nav;
}

function buildTabContent(){
  const wrap=el('div',{className:'screen'});
  if(STATE.activeTab==='home')     wrap.appendChild(buildHome());
  if(STATE.activeTab==='circles')  wrap.appendChild(buildCircles());
  if(STATE.activeTab==='connect')  wrap.appendChild(buildConnect());
  if(STATE.activeTab==='messages') wrap.appendChild(buildMessages());
  if(STATE.activeTab==='profile')  wrap.appendChild(buildProfile());
  return wrap;
}

      const txt=confInp.value.trim();if(!txt||txt.length<10){alert('Write at least 10 characters');return;}
      postBtn.innerHTML='<span class="ai-spinner"></span> Checking...';
      try{
        const mod=await moderateConfession(txt);
        if(mod.startsWith('SAFE')){
          STATE.confessions.unshift({id:'cf'+Date.now(),text:txt,likes:0,time:'Just now',reacted:false});
          STATE.confessionInput=false;
        } else {
          alert('\u26a0\ufe0f AI Moderation: '+mod.replace('UNSAFE:','').trim()+'\n\nPlease revise your confession.');

      }catch(e){STATE.confessions.unshift({id:'cf'+Date.now(),text:txt,likes:0,time:'Just now',reacted:false});STATE.confessionInput=false;}
      render();
    }});
    postBtn.innerHTML='\u2728 Post (AI-moderated)';confActions.appendChild(cancelBtn);confActions.appendChild(postBtn);
    confBox.appendChild(confActions);scroll.appendChild(confBox);
  }

  STATE.confessions.slice(0,5).forEach(c=>{
    const card=el('div',{className:'confession-card'});
    card.innerHTML=`<p class="conf-text">"${c.text}"</p><div class="conf-meta"><span>${c.time} · Anonymous</span></div>`;
    const reactBtn=el('button',{className:'conf-react-btn',onClick:()=>{if(!c.reacted){c.likes++;c.reacted=true;}else{c.likes--;c.reacted=false;}render();}});
    reactBtn.textContent=`${c.reacted?'\u2764\ufe0f':'\ud83e\udd0d'} ${c.likes}`;
    card.querySelector('.conf-meta').appendChild(reactBtn);
    scroll.appendChild(card);
  });

  container.appendChild(scroll);return container;
}

function buildConnect_results(container){
  container.innerHTML='';
  const scored=PEOPLE.map(p=>{const shared=p.interests.filter(i=>STATE.user.interests.includes(i));return{...p,shared,score:shared.length};})
    .filter(p=>{const q=connectSearch.toLowerCase();return(q===''||p.name.toLowerCase().includes(q)||p.interests.some(i=>i.toLowerCase().includes(q)))&&p.score>0;})
    .sort((a,b)=>b.score-a.score);
  if(scored.length===0){container.innerHTML=`<div class="empty-state"><p style="font-size:36px;margin-bottom:10px;">🔍</p><p style="font-size:15px;font-weight:800;color:var(--gray-600);margin-bottom:4px;">No matches yet</p></div>`;return;}
  scored.forEach(p=>{
    const isConn=STATE.connected.includes(p.id);

    const topRow=el('div',{style:{display:'flex',gap:'12px',alignItems:'flex-start'}});

    avDiv.innerHTML=mkAvatar(p.name,50,'');
    topRow.appendChild(avDiv);
    const info=el('div',{style:{flex:'1',minWidth:'0'}});
    const nameRow=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'2px'}});
    const nameEl=el('p',{style:{fontWeight:'900',fontSize:'15px',color:'var(--gray-800)',cursor:'pointer'},onClick:()=>{STATE.viewProfile=p;render();}});
    nameEl.textContent=p.name;nameRow.appendChild(nameEl);
    if(p.score>0){const badge=el('span',{style:{background:'#FEF3C7',color:'#D97706',fontSize:'10px',fontWeight:'800',padding:'2px 8px',borderRadius:'20px'}});badge.textContent=`${p.score} shared`;nameRow.appendChild(badge);}
    info.appendChild(nameRow);
    const sub=el('p',{style:{fontSize:'12px',color:'var(--gray-400)',marginBottom:'6px'}});sub.textContent=`${p.course} · ${p.year}`;info.appendChild(sub);
    const bio=el('p',{style:{fontSize:'12.5px',color:'var(--gray-600)',marginBottom:'8px',fontStyle:'italic'}});bio.textContent=`"${p.bio}"`;info.appendChild(bio);
    const tags=el('div',{style:{display:'flex',gap:'5px',flexWrap:'wrap'}});
    p.interests.forEach(i=>{const t=el('span',{className:'tag sm'+(STATE.user.interests.includes(i)?' active':'')});t.textContent=i;tags.appendChild(t);});
    info.appendChild(tags);topRow.appendChild(info);card.appendChild(topRow);
    const actRow=el('div',{style:{display:'flex',gap:'8px',marginTop:'12px'}});
    const connBtn=el('button',{className:'btn-sm'+(isConn?' joined':''),style:{flex:'1'},onClick:()=>{if(isConn){STATE.connected=STATE.connected.filter(x=>x!==p.id);}else{STATE.connected.push(p.id);}render();}});
    connBtn.textContent=isConn?'Connected ✓':'Connect';

    actRow.appendChild(connBtn);actRow.appendChild(msgBtn);

// CHAT — with AI replies, image sending
// ─────────────────────────────────────────────────────────────────────────────
let chatTab=0;

function getOrInitChat(id,isGroup,target){
  if(!STATE.messages[id]){
    if(isGroup){
      const seed=GROUP_SEEDS[id]||[];
      STATE.messages[id]=[
        {id:'sys1',isSystem:true,text:`Welcome to ${target.n}! 🎉 Let's make great memories together ✨`},
        ...seed.map((s,i)=>({id:'seed'+i,sender:s.sender,text:s.text,time:s.time})),
      ];
    } else {
      const shared=(target.interests||[]).filter(i=>STATE.user.interests.includes(i));
      const greetText=shared.length>0
        ?`Hey ${STATE.user.firstName}! Saw we both love ${shared[0]} 😊 So happy to connect!`
        :`Hey ${STATE.user.firstName}!! So nice to meet you here 💜`;
      STATE.messages[id]=[
        {id:'sys-ice',isSystem:true,text:'✨ AI is crafting a personalized icebreaker...'},
        {id:'init',sender:target.name,text:greetText,time:nowTime()}
      ];
      // Generate AI icebreaker suggestion
      (async()=>{
        try{
          const icebreaker=await getAIIcebreaker(target);
          const msgs=STATE.messages[id];
          const sysMsg=msgs.find(m=>m.id==='sys-ice');
          if(sysMsg) sysMsg.text='💡 AI Icebreaker suggestion: "'+icebreaker+'"';
          if(STATE.chatTarget?.id===id) render();
        }catch(e){
          const msgs=STATE.messages[id];
          const sysMsg=msgs.find(m=>m.id==='sys-ice');
          if(sysMsg) sysMsg.text='💡 Try asking about their interests to break the ice!';
          if(STATE.chatTarget?.id===id) render();
        }
      })();
    }
  }
  return STATE.messages[id];
}

function buildChat(){
  const t=STATE.chatTarget;
  const isGroup=!!(t.e&&t.bg);
  const chatId=t.id;
  const msgs=getOrInitChat(chatId,isGroup,t);
  const isTyping=STATE.typingChats[chatId]||false;

  const wrap=el('div',{className:'modal-full'});

  // Header
  const hdr=el('div',{style:{padding:'14px 18px',borderBottom:'1.5px solid var(--gray-100)',display:'flex',alignItems:'center',gap:'12px',flexShrink:'0',background:'var(--white)'}});
  const backBtn=el('button',{style:{background:'none',border:'none',cursor:'pointer',padding:'0',display:'flex'},onClick:()=>{STATE.chatTarget=null;chatTab=0;render();}});
  backBtn.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none">${ICONS.back.replace(/COLOR/g,'var(--gray-700)')}</svg>`;
  hdr.appendChild(backBtn);

  if(isGroup){
    const gi=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',flex:'1'}});
    gi.innerHTML=`<div class="circle-icon" style="width:42px;height:42px;background:${t.bg};">${t.e}</div><div style="flex:1;"><p style="font-weight:900;font-size:15px;color:var(--gray-800);">${t.n}</p><p style="font-size:11px;color:var(--green);font-weight:700;">● ${t.m} members · AI-powered</p></div>`;
    hdr.appendChild(gi);
  } else {
    const av=el('div',{html:mkAvatar(t.name,42)});hdr.appendChild(av);
    const info=el('div',{style:{flex:'1'}});
    const statusText=isTyping?'<span style="color:var(--purple);font-weight:700;font-size:11px;">✨ AI typing...</span>':'<span style="font-size:11px;color:var(--green);font-weight:700;">● Active now</span>';
    info.innerHTML=`<p style="font-weight:900;font-size:15px;color:var(--gray-800);">${t.name}</p>${statusText}`;
    hdr.appendChild(info);
  }
  hdr.appendChild(el('div',{html:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none">${ICONS.dots.replace(/COLOR/g,'var(--gray-400)')}</svg>`}));
  wrap.appendChild(hdr);

  if(isGroup){
    const tabRow=el('div',{style:{display:'flex',borderBottom:'1.5px solid var(--gray-100)',flexShrink:'0'}});
    ['Chat','Details','Members'].forEach((tt,i)=>{
      const b=el('button',{style:{flex:'1',padding:'11px',border:'none',background:'none',borderBottom:`3px solid ${chatTab===i?'var(--purple)':'transparent'}`,color:chatTab===i?'var(--purple)':'var(--gray-400)',fontWeight:'800',fontSize:'13px',cursor:'pointer',fontFamily:'Nunito'},onClick:()=>{chatTab=i;render();}});
      b.textContent=tt;tabRow.appendChild(b);
    });
    wrap.appendChild(tabRow);
  }

  if(chatTab===0){
    const msgArea=el('div',{style:{flex:'1',overflowY:'auto',padding:'14px 16px 8px',display:'flex',flexDirection:'column',gap:'10px'}});
    msgArea.id='msg-area';

    msgs.forEach(m=>{
      if(m.isSystem){
        const b=el('div',{className:'bubble-system'});b.textContent=m.text;msgArea.appendChild(b);
      } else if(m.isMine){
        const row=el('div',{style:{display:'flex',justifyContent:'flex-end'}});
        const inner=el('div',{style:{maxWidth:'230px'}});
        if(m.isImage){
          const imgBub=el('div',{className:'bubble-img'});
          imgBub.innerHTML=`<img src="${m.imageData}" onclick="this.closest('.bubble-img').style.maxWidth='300px'"/>`;
          inner.appendChild(imgBub);
        } else {
          const bub=el('div',{className:'bubble-mine'});bub.textContent=m.text;inner.appendChild(bub);
        }
        const ts=el('p',{style:{fontSize:'10px',color:'var(--gray-400)',textAlign:'right',marginTop:'3px'}});ts.textContent=m.time+' ✓✓';
        inner.appendChild(ts);row.appendChild(inner);msgArea.appendChild(row);
      } else {
        const row=el('div',{style:{display:'flex',gap:'8px',alignItems:'flex-end'}});
        row.innerHTML=mkAvatar(m.sender,30);
        const inner=el('div',{style:{maxWidth:'230px'}});
        if(isGroup){const nm=el('p',{style:{fontSize:'11px',fontWeight:'800',color:'var(--purple)',marginBottom:'3px'}});nm.textContent=m.sender;inner.appendChild(nm);}
        if(m.isImage){
          const imgBub=el('div',{className:'bubble-img'});imgBub.innerHTML=`<img src="${m.imageData}"/>`;inner.appendChild(imgBub);
        } else {
          const bub=el('div',{className:'bubble-other'});bub.textContent=m.text;inner.appendChild(bub);
        }
        const ts=el('p',{style:{fontSize:'10px',color:'var(--gray-400)',marginTop:'2px'}});ts.textContent=m.time;
        inner.appendChild(ts);row.appendChild(inner);msgArea.appendChild(row);
      }
    });

    if(isTyping){
      const typRow=el('div',{style:{display:'flex',gap:'8px',alignItems:'flex-end'}});
      typRow.innerHTML=mkAvatar(isGroup?'AI':t.name,30);
      const typBub=el('div',{style:{background:'var(--gray-100)',borderRadius:'20px 20px 20px 4px',padding:'12px 16px',display:'flex',gap:'5px',alignItems:'center'}});
      typBub.innerHTML='<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
      typRow.appendChild(typBub);msgArea.appendChild(typRow);
    }

    wrap.appendChild(msgArea);
    setTimeout(()=>{const a=document.getElementById('msg-area');if(a)a.scrollTop=a.scrollHeight;},60);

    // Input bar with image button
    const inputBar=el('div',{style:{padding:'10px 14px calc(16px + var(--safe-bottom))',borderTop:'1.5px solid var(--gray-100)',display:'flex',gap:'8px',alignItems:'center',flexShrink:'0',background:'white'}});
    
    // Image upload button
    const imgBtn=el('button',{style:{width:'40px',height:'40px',borderRadius:'50%',background:'var(--gray-100)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'},onClick:()=>{
      const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
      inp.onchange=e=>{
        const file=e.target.files[0];if(!file)return;
        const reader=new FileReader();
        reader.onload=async(ev)=>{
          msgs.push({id:Date.now(),isMine:true,isImage:true,imageData:ev.target.result,time:nowTime()});
          STATE.typingChats[chatId]=true;render();
          try {
            if(!isGroup){
              const reply=await getAIPersonReply(t, msgs, '[User sent a photo]');
              STATE.typingChats[chatId]=false;
              msgs.push({id:Date.now()+1,sender:t.name,text:reply,time:nowTime()});
            } else {
              const reply=await getAIGroupReply(t, msgs, '[User sent a photo]');
              STATE.typingChats[chatId]=false;
              msgs.push({id:Date.now()+1,sender:reply.sender,text:reply.text,time:reply.time});
            }
          } catch(err) {
            console.error('[CU Circle AI] Image reply error:', err);
            STATE.typingChats[chatId]=false;
          }
          render();
        };reader.readAsDataURL(file);
      };inp.click();
    }});
    imgBtn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none">${ICONS.image.replace(/COLOR/g,'var(--gray-500)')}</svg>`;

    const inputWrap=el('div',{style:{flex:'1',background:'var(--gray-100)',borderRadius:'24px',display:'flex',alignItems:'center',padding:'9px 14px',gap:'8px'}});
    const inp=el('input',{type:'text',placeholder:`Message ${isGroup?(t.n||'').split(' ')[0]:t.name.split(' ')[0]}…`,style:{flex:'1',background:'none',border:'none',outline:'none',fontSize:'14px',fontFamily:'Nunito',color:'var(--gray-800)'}});
    
    async function sendMsg(){
      const v=inp.value.trim();if(!v)return;
      const msgObj={id:Date.now(),isMine:true,text:v,time:nowTime()};
      msgs.push(msgObj);inp.value='';
      STATE.typingChats[chatId]=true;
      render();

      try {
        if(!isGroup){
          const reply=await getAIPersonReply(t, msgs, v);
          STATE.typingChats[chatId]=false;
          msgs.push({id:Date.now()+1,sender:t.name,text:reply,time:nowTime()});
        } else {
          const reply=await getAIGroupReply(t, msgs, v);
          STATE.typingChats[chatId]=false;
          msgs.push({id:Date.now()+1,sender:reply.sender,text:reply.text,time:reply.time});
        }
      } catch(err){
        console.error('[CU Circle AI] Chat error:', err);
        STATE.typingChats[chatId]=false;
        msgs.push({id:Date.now()+1,isSystem:true,text:'⚠️ AI couldn\'t respond — ' + (err.message || 'check your API key in console.groq.com')});
      }
      render();
    }

    inp.onkeydown=e=>{if(e.key==='Enter')sendMsg();};
    inputWrap.appendChild(inp);
    const sendBtn=el('button',{style:{width:'42px',height:'42px',borderRadius:'50%',background:'var(--purple)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 12px rgba(124,58,237,.4)',flexShrink:'0'},onClick:sendMsg});
    sendBtn.innerHTML=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none">${ICONS.send.replace(/COLOR/g,'white')}</svg>`;
    inputBar.appendChild(imgBtn);inputBar.appendChild(inputWrap);inputBar.appendChild(sendBtn);
    wrap.appendChild(inputBar);
  }

  if(isGroup&&chatTab===1){
    const scroll=el('div',{className:'scroll',style:{padding:'20px'}});
    scroll.innerHTML=`<div style="text-align:center;padding:16px 0 20px;"><div style="font-size:52px;margin-bottom:10px;">${t.e}</div><h3 style="font-size:20px;font-weight:900;color:var(--gray-800);margin-bottom:4px;">${t.n}</h3><p style="font-size:13px;color:var(--gray-500);margin-bottom:14px;line-height:1.5;">${t.desc}</p><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">${(t.tags||[]).map(tg=>`<span class="tag">${tg}</span>`).join('')}</div></div><div style="background:var(--purple-pale);border-radius:14px;padding:14px 16px;margin-top:16px;"><p style="font-size:13px;color:var(--purple);font-weight:700;">📍 Campus, Chitkara University</p><p style="font-size:13px;color:var(--purple);font-weight:700;margin-top:6px;">👥 ${t.m} members joined</p><p style="font-size:13px;color:var(--purple);font-weight:700;margin-top:6px;">✨ AI-powered conversations</p></div>`;
    wrap.appendChild(scroll);
  }
  if(isGroup&&chatTab===2){
    const scroll=el('div',{className:'scroll',style:{padding:'20px'}});
    const members=[STATE.user.name,'Riya Sharma','Karan Mehta','Ishita Verma','Dev Anand'];
    members.forEach((name,i)=>{
      const row=el('div',{style:{display:'flex',alignItems:'center',gap:'12px',padding:'12px 0',borderBottom:'1px solid var(--gray-100)'}});
      row.innerHTML=`${mkAvatar(name,42,i===0?(STATE.profilePic?'':''):'',i===0?STATE.profilePic:null)}<div style="flex:1;"><p style="font-weight:800;font-size:14px;color:var(--gray-800);">${name}${i===0?' (You)':''}</p><p style="font-size:11px;color:var(--green);font-weight:700;">● Active now</p></div>`;
      scroll.appendChild(row);
    });
    wrap.appendChild(scroll);
  }
  return wrap;
}

  if(STATE.helpTyping){
    const typRow=el('div',{style:{display:'flex',gap:'10px',alignItems:'flex-start'}});
    typRow.innerHTML=`<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--purple-lt));display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none">${ICONS.sparkle.replace(/COLOR/g,'white')}</svg></div>`;
    const typBub=el('div',{style:{background:'linear-gradient(135deg,var(--purple),var(--purple-lt))',borderRadius:'18px 18px 18px 4px',padding:'12px 16px',display:'flex',gap:'5px',alignItems:'center'}});
    typBub.innerHTML='<span class="typing-dot" style="background:white;"></span><span class="typing-dot" style="background:white;"></span><span class="typing-dot" style="background:white;"></span>';
    typRow.appendChild(typBub);msgArea.appendChild(typRow);
  }

  wrap.appendChild(msgArea);
  setTimeout(()=>{const a=document.getElementById('help-msg-area');if(a)a.scrollTop=a.scrollHeight;},60);

  // Input
  const inputBar=el('div',{style:{padding:'10px 14px calc(16px + var(--safe-bottom))',borderTop:'1.5px solid var(--gray-100)',display:'flex',gap:'8px',alignItems:'center',flexShrink:'0',background:'white'}});
  const inputWrap=el('div',{style:{flex:'1',background:'var(--gray-100)',borderRadius:'24px',display:'flex',alignItems:'center',padding:'9px 14px',gap:'8px'}});
  const inp=el('input',{type:'text',placeholder:'Ask me anything…',style:{flex:'1',background:'none',border:'none',outline:'none',fontSize:'14px',fontFamily:'Nunito',color:'var(--gray-800)'}});

  async function sendHelp(){
    const v=inp.value.trim();if(!v||STATE.helpTyping)return;
    STATE.helpMessages.push({text:v,isUser:true,time:nowTime()});
    inp.value='';STATE.helpTyping=true;render();
    try{
      const reply=await getAIHelp(STATE.helpMessages,v);
      STATE.helpTyping=false;
      STATE.helpMessages.push({text:reply,isUser:false,time:nowTime()});
    }catch(e){STATE.helpTyping=false;STATE.helpMessages.push({text:'I\'m having a little moment! 💜 Try again in a sec.',isUser:false,time:nowTime()});}
    render();
  }

  inp.onkeydown=e=>{if(e.key==='Enter')sendHelp();};
  inputWrap.appendChild(inp);
  const sendBtn=el('button',{style:{width:'42px',height:'42px',borderRadius:'50%',background:'linear-gradient(135deg,var(--purple),var(--purple-lt))',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 12px rgba(124,58,237,.4)',flexShrink:'0'},onClick:sendHelp});
  sendBtn.innerHTML=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none">${ICONS.send.replace(/COLOR/g,'white')}</svg>`;
  inputBar.appendChild(inputWrap);inputBar.appendChild(sendBtn);
  wrap.appendChild(inputBar);
  return wrap;
}

// ─────────────────────────────────────────────────────────────────────────────
// REAL PEOPLE CHAT ROOM (Live Campus Chat)
// Uses a shared-like local channel — in GitHub Pages mode, messages are stored
// in localStorage so any visitor on the same device/browser can participate.
// For true multi-device realtime, a backend (Firebase/Supabase) would be needed.
// ─────────────────────────────────────────────────────────────────────────────
function syncRealMessages(){
  try{
    const stored=localStorage.getItem('cu_circle_live_chat');
    if(stored){
      const parsed=JSON.parse(stored);
      // Merge new messages we don't have
      const myIds=new Set(STATE.realMessages.map(m=>m.id));
      parsed.forEach(m=>{if(!myIds.has(m.id))STATE.realMessages.push(m);});
      STATE.realMessages.sort((a,b)=>a.id-b.id);
    }
  }catch(e){}
}
function saveRealMessages(){
  try{localStorage.setItem('cu_circle_live_chat',JSON.stringify(STATE.realMessages.slice(-100)));}catch(e){}
}

// Seed with some AI persona messages so the room feels alive
const LIVE_SEEDS=[
  {id:1000,sender:'Riya Sharma',text:'Hey everyone! Anyone want to study for CAT exams together? 📚',time:'10:32 AM',isMe:false},
  {id:1001,sender:"Karan Mehta",text:"I'm in! Block A library at 4pm?",time:"10:33 AM",isMe:false},
  {id:1002,sender:'Ananya Joshi',text:'This chat is so cool 💜 finally a way to meet people on campus',time:'10:34 AM',isMe:false},
];

function buildRealChat(){
  // Sync on open
  syncRealMessages();
  if(STATE.realMessages.length===0){
    STATE.realMessages=[...LIVE_SEEDS];
    saveRealMessages();
  }

  const wrap=el('div',{className:'modal-full',style:{background:'var(--white)'}});

  // Header
  const hdr=el('div',{style:{padding:'14px 18px',borderBottom:'1.5px solid var(--gray-100)',display:'flex',alignItems:'center',gap:'12px',flexShrink:'0',background:'var(--white)'}});
  const backBtn=el('button',{style:{background:'var(--gray-100)',border:'none',borderRadius:'50%',width:'36px',height:'36px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'},onClick:()=>{STATE.showRealChat=false;render();}});
  backBtn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none">${ICONS.back.replace(/COLOR/g,'var(--gray-700)')}</svg>`;
  hdr.appendChild(backBtn);
  const hdrInfo=el('div',{style:{flex:'1'}});
  hdrInfo.innerHTML=`<p style="font-weight:900;font-size:16px;color:var(--gray-800);">🔴 Live Campus Chat</p><p style="font-size:11px;color:var(--green);font-weight:700;">Real students + AI personas active</p>`;
  hdr.appendChild(hdrInfo);
  wrap.appendChild(hdr);

  // Name setup if not set
  if(!STATE.realName){
    const nameSetup=el('div',{style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px',gap:'16px'}});
    nameSetup.innerHTML=`<p style="font-size:52px;margin-bottom:4px;">👋</p><p style="font-size:20px;font-weight:900;color:var(--gray-800);margin-bottom:4px;">Join the live chat!</p><p style="font-size:13px;color:var(--gray-500);text-align:center;line-height:1.6;">This is a real-time room where actual students can chat. Your CU Circle name will be used.</p>`;
    const useNameBtn=el('button',{className:'btn-primary',style:{maxWidth:'280px'},onClick:()=>{STATE.realName=STATE.user.name;render();}});
    useNameBtn.textContent=`Join as ${STATE.user.name} →`;
    nameSetup.appendChild(useNameBtn);
    wrap.appendChild(nameSetup);
    return wrap;
  }

  // Messages area
  const msgArea=el('div',{style:{flex:'1',overflowY:'auto',padding:'14px 16px 8px',display:'flex',flexDirection:'column',gap:'10px'}});
  msgArea.id='real-msg-area';

  // System banner
  const banner=el('div',{className:'bubble-system',style:{margin:'0 0 8px'}});
  banner.innerHTML=`🔴 <strong>Live Campus Chat</strong> — Messages are shared across devices via browser storage. Refresh to see new messages from other visitors!`;
  msgArea.appendChild(banner);

  STATE.realMessages.forEach(m=>{
    const isMe=m.sender===STATE.realName;
    const row=el('div',{style:{display:'flex',gap:'8px',alignItems:'flex-end',justifyContent:isMe?'flex-end':'flex-start'}});
    if(!isMe){
      row.innerHTML=mkAvatar(m.sender,30);
    }
    const inner=el('div',{style:{maxWidth:'240px'}});
    if(!isMe){const nm=el('p',{style:{fontSize:'11px',fontWeight:'800',color:'var(--purple)',marginBottom:'3px'}});nm.textContent=m.sender;inner.appendChild(nm);}
    const bub=el('div',{className:isMe?'bubble-mine':'bubble-other'});bub.textContent=m.text;inner.appendChild(bub);
    const ts=el('p',{style:{fontSize:'10px',color:'var(--gray-400)',textAlign:isMe?'right':'left',marginTop:'2px'}});ts.textContent=m.time+(isMe?' ✓✓':'');
    inner.appendChild(ts);row.appendChild(inner);msgArea.appendChild(row);
  });
  wrap.appendChild(msgArea);
  setTimeout(()=>{const a=document.getElementById('real-msg-area');if(a)a.scrollTop=a.scrollHeight;},60);

  // Input bar
  const inputBar=el('div',{style:{padding:'10px 14px calc(16px + var(--safe-bottom))',borderTop:'1.5px solid var(--gray-100)',display:'flex',gap:'8px',alignItems:'center',flexShrink:'0',background:'white'}});
  const inputWrap=el('div',{style:{flex:'1',background:'var(--gray-100)',borderRadius:'24px',display:'flex',alignItems:'center',padding:'9px 14px',gap:'8px'}});
  const inp=el('input',{type:'text',placeholder:'Say something to the campus...',style:{flex:'1',background:'none',border:'none',outline:'none',fontSize:'14px',fontFamily:'Nunito',color:'var(--gray-800)'}});

  function sendReal(){
    const v=inp.value.trim();if(!v)return;
    const msg={id:Date.now(),sender:STATE.realName,text:v,time:nowTime(),isMe:true};
    STATE.realMessages.push(msg);
    inp.value='';
    saveRealMessages();
    render();
    // AI persona auto-reply occasionally (30% chance)
    if(Math.random()<0.3){
      const aiPeople=['Riya Sharma','Karan Mehta','Ananya Joshi','Dev Anand','Ishita Verma'];
      const aiSender=aiPeople[Math.floor(Math.random()*aiPeople.length)];
      const aiPerson=PEOPLE.find(p=>p.name===aiSender)||PEOPLE[0];
      setTimeout(async()=>{
        try{
          const reply=await getAIPersonReply(aiPerson,[],v);
          const aiMsg={id:Date.now()+1,sender:aiSender,text:reply,time:nowTime(),isMe:false};
          STATE.realMessages.push(aiMsg);
          saveRealMessages();
          if(STATE.showRealChat)render();
        }catch(e){}
      },1200+Math.random()*2000);
    }
  }

  inp.onkeydown=e=>{if(e.key==='Enter')sendReal();};
  inputWrap.appendChild(inp);
  const sendBtn=el('button',{style:{width:'42px',height:'42px',borderRadius:'50%',background:'var(--purple)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 12px rgba(124,58,237,.4)',flexShrink:'0'},onClick:sendReal});
  sendBtn.innerHTML=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none">${ICONS.send.replace(/COLOR/g,'white')}</svg>`;
  inputBar.appendChild(inputWrap);inputBar.appendChild(sendBtn);
  wrap.appendChild(inputBar);

  // Refresh button to load new messages from other devices
  const refreshBar=el('div',{style:{padding:'4px 14px 0',display:'flex',justifyContent:'center',flexShrink:'0'}});
  const refreshBtn=el('button',{style:{background:'none',border:'none',fontSize:'11px',color:'var(--purple)',fontWeight:'700',cursor:'pointer',fontFamily:'Nunito'},onClick:()=>{syncRealMessages();render();}});
  refreshBtn.textContent='↻ Refresh to see messages from others';
  refreshBar.appendChild(refreshBtn);
  wrap.insertBefore(refreshBar,inputBar);

  return wrap;
}


render();
</script>
